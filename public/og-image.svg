<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">UZVibes social preview</title>
  <desc id="desc">Black and purple neon social-location preview for UZVibes in Tashkent.</desc>
  <defs>
    <linearGradient id="heroText" x1="104" x2="812" y1="128" y2="488" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" />
      <stop offset="0.45" stop-color="#f0b8ff" />
      <stop offset="0.75" stop-color="#b389ff" />
      <stop offset="1" stop-color="#65eaff" />
    </linearGradient>
    <linearGradient id="purpleBrand" x1="70" x2="356" y1="44" y2="298" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff69ff" />
      <stop offset="0.42" stop-color="#d42dff" />
      <stop offset="1" stop-color="#8d39ff" />
    </linearGradient>
    <radialGradient id="logoGlow" cx="0" cy="0" r="1" gradientTransform="translate(170 170) rotate(48) scale(220)">
      <stop stop-color="#ff35f2" stop-opacity="0.56" />
      <stop offset="1" stop-color="#ff35f2" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientTransform="translate(894 170) rotate(40) scale(420)">
      <stop stop-color="#42f4ff" stop-opacity="0.28" />
      <stop offset="1" stop-color="#42f4ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaGlow" cx="0" cy="0" r="1" gradientTransform="translate(1015 520) rotate(44) scale(420)">
      <stop stop-color="#ff2fd6" stop-opacity="0.36" />
      <stop offset="1" stop-color="#ff2fd6" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.42" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#030108" />
  <rect width="1200" height="630" fill="url(#cyanGlow)" />
  <rect width="1200" height="630" fill="url(#magentaGlow)" />
  <g opacity="0.16">
    <path d="M0 106h1200M0 212h1200M0 318h1200M0 424h1200M0 530h1200" stroke="#ffffff" />
    <path d="M106 0v630M212 0v630M318 0v630M424 0v630M530 0v630M636 0v630M742 0v630M848 0v630M954 0v630M1060 0v630M1166 0v630" stroke="#ffffff" />
  </g>

  <g transform="translate(78 72)">
    <rect x="0" y="0" width="154" height="154" rx="38" fill="#05020a" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2" />
    <circle cx="76" cy="82" r="112" fill="url(#logoGlow)" />
    <text x="77" y="109" text-anchor="middle" fill="url(#purpleBrand)" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="950" filter="url(#softGlow)">UZ</text>
  </g>

  <g transform="translate(80 270)">
    <text x="0" y="0" fill="url(#heroText)" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="950">Feel the vibe</text>
    <text x="0" y="92" fill="url(#heroText)" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="950">of Tashkent.</text>
    <text x="3" y="156" fill="#d2c5e6" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Discover active places, chats, events, friends,</text>
    <text x="3" y="198" fill="#d2c5e6" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">rankings, and city energy around Tashkent.</text>
  </g>

  <g transform="translate(760 74)" filter="url(#cardShadow)">
    <rect width="278" height="484" rx="46" fill="#121024" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3" />
    <rect x="18" y="18" width="242" height="448" rx="34" fill="#07040d" />
    <rect x="94" y="30" width="92" height="22" rx="11" fill="#030108" />
    <rect x="40" y="78" width="198" height="72" rx="12" fill="#ffffff" fill-opacity="0.09" stroke="#ffffff" stroke-opacity="0.15" />
    <text x="58" y="106" fill="#9a86bb" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900">TONIGHT IN</text>
    <text x="58" y="132" fill="#fbf7ff" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="950">Tashkent</text>
    <rect x="190" y="94" width="34" height="34" rx="12" fill="#05020a" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="207" y="117" text-anchor="middle" fill="#d42dff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="950">UZ</text>

    <rect x="40" y="168" width="198" height="116" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14" />
    <text x="58" y="200" fill="#9a86bb" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">CITY VIBE</text>
    <text x="58" y="252" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="950">94%</text>
    <rect x="58" y="263" width="144" height="9" rx="5" fill="#ffffff" fill-opacity="0.16" />
    <rect x="58" y="263" width="134" height="9" rx="5" fill="#d42dff" />

    <rect x="40" y="304" width="198" height="55" rx="12" fill="#9c5cff" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.14" />
    <text x="58" y="328" fill="#9a86bb" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">ACTIVE SPOTS</text>
    <text x="58" y="349" fill="#fbf7ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="950">C1 is active</text>

    <rect x="40" y="376" width="198" height="55" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14" />
    <text x="58" y="400" fill="#9a86bb" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">FRIENDS NEARBY</text>
    <text x="58" y="421" fill="#fbf7ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="950">4 around you</text>
  </g>

  <g opacity="0.95">
    <rect x="716" y="124" width="176" height="44" rx="22" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="804" y="153" text-anchor="middle" fill="#fbf7ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">C1 active now</text>
    <rect x="922" y="476" width="190" height="44" rx="22" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="1017" y="505" text-anchor="middle" fill="#fbf7ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">+120 XP today</text>
    <rect x="680" y="516" width="224" height="44" rx="22" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="792" y="545" text-anchor="middle" fill="#fbf7ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">New event tonight</text>
  </g>
</svg>
